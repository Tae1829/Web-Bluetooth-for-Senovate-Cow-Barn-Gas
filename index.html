<!DOCTYPE html>
<html>
<head>
    <title>Cow Barn Sensor Config</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        button { padding: 10px 20px; margin: 10px 0; cursor: pointer; }
        .card { border: 1px solid #ccc; padding: 15px; border-radius: 8px; max-width: 400px; }
    </style>
</head>
<body>
    <h2>Cow Barn Gas Sensor Configuration</h2>
    <div class="card">
        <button onclick="connectBLE()">1. Connect to Sensor</button>
        <p>Status: <span id="status">Disconnected</span></p>
        <hr>
        <label>Measurement Interval (Seconds):</label><br>
        <input type="number" id="intervalInput" value="60">
        <button onclick="writeInterval()">2. Update Interval</button>
    </div>

    <script>
        const SERVICE = '0000181A-0000-1000-8000-00805f9b34fb';                 // Environmental Sensing Service
        const CHARACTERISTIC_UUID = '00002A21-0000-1000-8000-00805f9b34fb';     // Measurement Interval Characteristic

        let sensorCharacteristic;

        async function connectBLE() {
            try {
                document.getElementById('status').innerText = "Searching for all devices...";
                
                // 1. Accept all devices (This bypasses the UUID filter problem)
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'CowBarn' }],
                    optionalServices: SERVICE
                });

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE);
                sensorCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

                document.getElementById('status').innerText = "Connected to " + device.name;
            } catch (error) {
                console.error("Connection failed:", error);
                document.getElementById('status').innerText = "Error: " + error.message;
            }
        }

        async function writeInterval() {
            if (!sensorCharacteristic) {
                alert("Please connect first!");
                return;
            }

            const value = document.getElementById('intervalInput').value;
            
            // BLE uses Little Endian for multi-byte values
            // We create a 2-byte buffer (uint16)
            const buffer = new Uint16Array([value]).buffer;
            const dataView = new DataView(buffer);

            try {
                // Use writeValueWithResponse to ensure the ESP32 received it
                await sensorCharacteristic.writeValueWithResponse(dataView);
                alert("Interval updated to " + value + " seconds!");
            } catch (error) {
                console.error("Write failed:", error);
                alert("Write failed: " + error.message);
            }
        }
    </script>
</body>
</html>
