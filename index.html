<!DOCTYPE html>
<html>
<head>
    <title>Barn Monitor - Connect</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px 20px; background: #f4f4f9; }
        .btn { 
            display: inline-block; padding: 15px 30px; font-size: 18px; 
            font-weight: bold; color: white; background: #007bff; 
            text-decoration: none; border-radius: 10px; margin: 10px;
        }
        .ios-only { display: none; }
        .instructions { color: #666; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <h2>Barn Sensor Link</h2>
    <p id="msg">Detecting your browser...</p>

    <div id="ios-bridge" class="ios-only">
        <a id="bluefyLink" href="#" class="btn">🚀 Open in Bluefy App</a>
        <div class="instructions">
            <p>iOS Safari does not support Bluetooth.</p>
            <p>Tap above to switch to the Bluefy Browser.</p>
            <p><small>Don't have it? <a href="https://apps.apple.com/app/id1492822055">Download Bluefy on App Store</a></small></p>
        </div>
    </div>

    <script>
        const targetUrl = window.location.href.replace("index.html", "configuration.html");
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isBluefy = navigator.userAgent.includes("Bluefy");

        if (isBluefy || !isIOS) {
            // If already in Bluefy or on Android/PC, skip this page
            window.location.replace(targetUrl);
        } else {
            // We are in iOS Safari
            document.getElementById('msg').innerText = "iOS Device Detected";
            document.getElementById('ios-bridge').style.display = "block";
            
            // This is the Magic Link
            // It converts https://yoursite.com to bluefy://yoursite.com
            const bluefyUrl = targetUrl.replace(/^https?:\/\//, 'bluefy://');
            document.getElementById('bluefyLink').href = bluefyUrl;
        }
    </script>
</body>
</html>
